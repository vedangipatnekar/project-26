<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel | Web Vulnerability Scanner</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-blur"></div>

  <main class="app-container">
    <header class="top-nav">
      <div class="logo">
        <span class="shield-icon">🛡️</span>
        <span class="brand">Sentinel<span class="dot">.</span></span>
      </div>
      
      <div class="nav-links">
        <a href="index.html" class="nav-link active">Scanner</a>
        <a href="history.html" class="nav-link">History</a>
      </div>

      <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
      </button>
    </header>

    <div class="dashboard-grid">
      <!-- CONTROL PANEL -->
      <section class="panel control-panel">
        <div class="panel-header">
          <h2>Security Audit</h2>
          <p>Initialize a new deep scan</p>
        </div>

        <div class="input-group">
          <label for="url">Target URL</label>
          <div class="input-wrapper">
            <input id="url" type="url" placeholder="https://testphp.vulnweb.com" required>
          </div>
        </div>

        <button id="scanBtn" class="primary-btn" onclick="startScan()">
          <span class="btn-text">Initialize Scan</span>
        </button>

        <div class="divider"><span>Analysis Tools</span></div>

        <div class="input-group">
          <input id="search" placeholder="🔍 Filter logs..." oninput="searchOutput()">
        </div>

        <div class="progress-container hidden" id="progress">
          <div class="progress-labels">
            <span>Analyzing...</span>
            <span id="percentText">Wait...</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
        </div>
      </section>

      <!-- RESULTS PANEL -->
      <section class="panel results-panel">
        
        <!-- NEW HEADER LAYOUT: Tabs on the left, PDF Download button on the right -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <div class="panel-tabs" style="margin-bottom: 0; flex: 1;">
            <button id="tabBtnTerminal" class="tab-btn active" onclick="switchTab('terminal')">Log Output</button>
            <button id="tabBtnVisuals" class="tab-btn" onclick="switchTab('visuals')">Analytics</button>
          </div>
          <button class="secondary-btn" onclick="downloadPDF()" style="width: auto; margin-top: 0; margin-left: 16px; padding: 9px 16px; transform: translateY(0);">
            <span class="icon">📄</span> Export Report
          </button>
        </div>

        <div id="tab-terminal" class="tab-content">
          <div class="monitor-grid">
            <div class="terminal-wrapper">
              <div class="terminal-header">
                <div class="dots"><span></span><span></span><span></span></div>
                <span class="label">sentinel_scan.log</span>
              </div>
              <div class="terminal-body" id="output">Waiting for target input...</div>
            </div>
            
            <div class="browser-monitor">
              <div class="terminal-header">
                <span class="label" style="color: #10b981;">● LIVE_FEED</span>
              </div>
              <div class="browser-screen">
                 <img id="liveFeed" src="" alt="Live Scanner View" class="hidden">
                 <div id="liveFeedPlaceholder" class="feed-placeholder">
                    <span class="icon">📷</span>
                    <p>Awaiting scan initialization...</p>
                 </div>
              </div>
            </div>
          </div>
        </div>

        <div id="tab-visuals" class="tab-content hidden">
          <div class="analytics-header">
            <div class="toggle-group">
              <button class="toggle-btn active" onclick="toggleChartView('bar')">📊 Bar Graph</button>
              <button class="toggle-btn" onclick="toggleChartView('pie')">🥧 Pie Chart</button>
            </div>
          </div>
          <div class="chart-viewport">
            <div id="barWrapper" class="chart-wrapper-inner">
              <canvas id="owaspBar"></canvas>
            </div>
            <div id="pieWrapper" class="chart-wrapper-inner hidden">
              <canvas id="owaspPie"></canvas>
            </div>
          </div>
        </div>
        
        <!-- Removed the old bottom footer entirely -->
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
